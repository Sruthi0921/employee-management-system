<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Employee Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5 shadow p-4">

<h2 class="mb-4">Employee Management System</h2>

<a href="/employees/new" class="btn btn-primary mb-3">Add Employee</a>

<table class="table table-bordered">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Salary</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr th:each="employee : ${employees}">

<td th:text="${employee.id}"></td>
<td th:text="${employee.name}"></td>
<td th:text="${employee.email}"></td>
<td th:text="${employee.department}"></td>
<td th:text="${employee.salary}"></td>

<td>

<a th:href="@{'/employees/edit/' + ${employee.id}}" 
class="btn btn-warning btn-sm">Edit</a>

<a th:href="@{'/employees/delete/' + ${employee.id}}" 
class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

</tbody>

</table>

</div>

</body>
</html>
